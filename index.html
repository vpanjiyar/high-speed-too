<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Speed Too</title>
  </head>
  <body>
    <div id="map"></div>
    <div id="ui">
      <div id="title-card">
        <span id="title-text">High Speed Too</span>
      </div>

      <!-- Overlays panel -->
      <div id="overlays-panel">
        <div id="overlays-header">
          <span id="overlays-title">Overlays</span>
        </div>

        <!-- Rail infrastructure section -->
        <div class="overlay-section">
          <div class="overlay-section-heading">Rail Infrastructure</div>
          <div class="overlay-toggles">
            <label class="overlay-toggle">
              <input type="checkbox" id="toggle-rail-lines" checked />
              <span class="overlay-toggle-track"></span>
              <span class="overlay-toggle-label">National rail</span>
            </label>
            <label class="overlay-toggle">
              <input type="checkbox" id="toggle-metro-lines" checked />
              <span class="overlay-toggle-track"></span>
              <span class="overlay-toggle-label">City metros</span>
            </label>
            <label class="overlay-toggle">
              <input type="checkbox" id="toggle-rail-stations" checked />
              <span class="overlay-toggle-track"></span>
              <span class="overlay-toggle-label">Stations</span>
            </label>
          </div>
        </div>

        <div class="overlay-divider"></div>

        <!-- Census section -->
        <div class="overlay-section">
          <div class="overlay-section-heading">
            Census
            <span id="census-loading">⏳</span>
          </div>
          <fieldset id="census-metrics">
            <label class="census-radio">
              <input type="radio" name="census-metric" value="off" checked />
              <span class="census-radio-dot"></span>
              <span class="census-radio-label">Off</span>
            </label>
            <label class="census-radio">
              <input type="radio" name="census-metric" value="population" />
              <span class="census-radio-dot"></span>
              <span class="census-swatch census-swatch--population"></span>
              <span class="census-radio-label">Population</span>
            </label>
            <label class="census-radio">
              <input type="radio" name="census-metric" value="density" />
              <span class="census-radio-dot"></span>
              <span class="census-swatch census-swatch--density"></span>
              <span class="census-radio-label">Density (pop/ha)</span>
            </label>
            <label class="census-radio">
              <input type="radio" name="census-metric" value="working_age" />
              <span class="census-radio-dot"></span>
              <span class="census-swatch census-swatch--working_age"></span>
              <span class="census-radio-label">Working Age %</span>
            </label>
          </fieldset>
          <div id="census-legend">
            <div id="census-legend-bar"></div>
            <div id="census-legend-labels">
              <span id="census-legend-min"></span>
              <span id="census-legend-max"></span>
            </div>
          </div>
          <div id="census-error"></div>
          <div id="census-updated"></div>
        </div>
      </div>

      <div id="no-tiles-warning">
        <strong>No tile data found.</strong><br />
        Run <code>npm run download-tiles</code> then reload.
      </div>

      <!-- ── Network builder toolbar ──────────────────────────────────────── -->
      <div id="network-toolbar">
        <button class="tool-btn active" id="tool-select" title="Select">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 1l10 6.5L8.5 9l-2 5.5L3 1z"/></svg>
        </button>
        <button class="tool-btn" id="tool-station" title="Place Station">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>
        </button>
        <button class="tool-btn" id="tool-line" title="Draw Line">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13L8 5l5 8" stroke-linejoin="round"/><circle cx="3" cy="13" r="1.5" fill="currentColor"/><circle cx="8" cy="5" r="1.5" fill="currentColor"/><circle cx="13" cy="13" r="1.5" fill="currentColor"/></svg>
        </button>
        <div class="tool-separator"></div>
        <button class="tool-btn tool-btn--danger" id="tool-clear" title="Clear All">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </button>
      </div>

      <!-- ── Line editor panel (shown in 'line' mode) ─────────────────────── -->
      <div id="line-panel" class="panel hidden">
        <div class="panel-header">
          <span class="panel-title">Lines</span>
          <button id="line-panel-close" class="panel-close" title="Close">&times;</button>
        </div>

        <!-- New line form -->
        <div id="new-line-form">
          <input id="new-line-name" type="text" placeholder="Line name…" maxlength="40" autocomplete="off" />
          <div id="new-line-colors"></div>
          <button id="new-line-add" class="btn-primary">Add Line</button>
        </div>

        <!-- Line list -->
        <div id="line-list"></div>
      </div>

      <!-- ── Station info panel (shown when station selected) ─────────────── -->
      <div id="station-panel" class="panel hidden">
        <div class="panel-header">
          <span class="panel-title">Station</span>
          <button id="station-panel-close" class="panel-close" title="Close">&times;</button>
        </div>
        <div id="station-edit">
          <input id="station-name-input" type="text" placeholder="Station name…" maxlength="60" autocomplete="off" />
          <button id="station-delete" class="btn-danger">Delete</button>
        </div>
      </div>

      <!-- Zoom level hotlinks — bottom-right, sits above the scale bar -->
      <div id="zoom-links">
        <button class="zoom-link" data-zoom="5.5"  data-label="UK">UK</button>
        <button class="zoom-link" data-zoom="8"    data-label="Region">Region</button>
        <button class="zoom-link" data-zoom="11"   data-label="City">City</button>
        <button class="zoom-link" data-zoom="14"   data-label="Street">Street</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
